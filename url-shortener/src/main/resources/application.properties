# Server configuration
server.port=8080

# H2 Database configuration
spring.datasource.url=jdbc:h2:mem:url_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Show H2 console at http://localhost:8080/h2-console
spring.h2.console.enabled=true

# JPA/Hibernate settings (to automatically create tables)
spring.jpa.hibernate.ddl-auto=update

# CORS configuration (CRITICAL for connecting React to Spring Boot)
# This allows your React app (default: 3000) to talk to your Spring app (8080)
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,OPTIONS
spring.web.cors.max-age=3600